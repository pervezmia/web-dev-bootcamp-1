<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Button || Home page</title>
    <!-- tailwind cdn  -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div id="btn-container" class="w-9/12 my-20 mx-auto">
        <button class="active-btn bg-black text-white px-3 py-1 rounded-2xl">All</button>
        <button class="active-btn bg-gray-300 text-black px-3 py-1 rounded-2xl">Click</button>
        <button class="active-btn bg-gray-300 text-black px-3 py-1 rounded-2xl">Press</button>
        <button class="active-btn bg-gray-300 text-black px-3 py-1 rounded-2xl">Close</button>
    </div>

    <script>
        const btnContainer = document.getElementById("btn-container");


        const activeBtn = () => {
            btnContainer.addEventListener("click", (event) => {

                // if(event.target.tagName !== "BUTTON") return;
                if(!event.target.classList.contains("active-btn")) return;
                
                const clickBtn = event.target;

                const allBtn = document.querySelectorAll(".active-btn")
                
                allBtn.forEach(btn => {
                    btn.classList.remove("bg-black", "text-white");
                    btn.classList.add("bg-gray-300", "text-black");
                })

                clickBtn.classList.add("bg-black", "text-white");
                clickBtn.classList.remove("bg-gray-300", "text-black");
            })
        }
        activeBtn();

    </script>
    <script src="script.js"></script>
</body>

</html>

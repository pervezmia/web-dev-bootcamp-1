<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green-world</title>
    <!-- tailwind link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>



    <main class="w-11/12 mx-auto">
        <h2 class="text-4xl font-bold text-center">All Trees</h2>
        <section class="grid grid-cols-1 sm:grid-cols-4 gap-4">
            <!-- btn container -->

            <div class=" card col-span-1 shadow-2xl ">
                <div id="btns-container" class="sticky top-8 grid grid-cols-1 gap-2 p-4">


                    <button id="all-trees-btn" class="btn btn-success">All trees</button>

                    <!-- onclick="clickBtn()" -->
                </div>
            </div>

            <!-- tree container  -->
            <div class="card col-span-1 sm:col-span-2 bg-white shadow-2xl p-4">
                <div id="treeContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-4">



                </div>

                <!-- loading snipper -->
                <div id="loadingSnipper" class="hidden flex justify-center items-center">
                    <span class="loading loading-infinity loading-xl"></span>
                </div>

            </div>

            <!-- total container -->
            <div class="card col-span-1 shadow-xl p-5">
                <div class="flex justify-start items-center ml-4">
                    <i class="fa-solid fa-cart-arrow-down"></i>
                    <h2 class="font-bold text-2xl ml-5">Cart</h2>
                </div>
                <div id="cart-container" class="space-y-4 mb-4">
                    <!-- <div class="card card-body shadow-2xl bg-green-50 shadow-xl">
                        <div class="flex justify-between items-center">
                            <div>
                                <h2>name </h2>

                            </div>
                            <button>x</button>
                        </div>
                        <div class="flex justify-between items-center">
                            <p>459 x 4</p>

                            <p class="text-end">$ 500</p>
                        </div>

                    </div> -->
                </div>
                <div class=" card shadow-xl bg-green-50 rounded-lg p-4 mb-3">
                    <div class="flex  justify-between items-center">
                        <p>Total</p>
                        <p id="totalPrice">$440</p>
                    </div>
                </div>

            </div>

        </section>


        <dialog id="treeDetails" class="modal">
            <div class="modal-box space-y-4">

                <h3 class="font-bold text-2xl text-green-300" id="modalTitle"></h3>

                <div class="space-y-4">
                    <img id="modalImage" src="" alt="Plant" class="w-full !h-[250px] object-cover rounded-xl mb-12">
                    <!-- plant details  -->
                    <p id="modalDescription"></p>
                    <div class="flex justify-between items-start mb-4">
                        <div id="modalCategory" class="badge badge-success font-bold"></div>
                        <div class="flex gap-1 items-center badge badge-success">
                            <p id="modalPrice" class="font-bold text-xl "></p>
                            <i class="fa-solid fa-bangladeshi-taka-sign"></i>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mb-4">
                        <button class="btn btn-primary outline-0 "
                            onclick="document.getElementById('treeDetails').close()">close</button>
                    </div>

                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
                    </form>
                </div>

            </div>
        </dialog>
    </main>



    <script src="index.js"></script>
</body>

</html>
